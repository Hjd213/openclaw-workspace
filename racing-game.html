<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极速赛车 🏎️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        .game-container {
            text-align: center;
        }
        h1 {
            color: #fff;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 0, 100, 0.5);
            font-size: 2.5em;
        }
        .info-bar {
            display: flex;
            justify-content: space-between;
            max-width: 400px;
            margin: 0 auto 10px;
            color: #fff;
            font-size: 1.2em;
        }
        .score, .lives, .level {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }
        canvas {
            border: 4px solid #ff0064;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(255, 0, 100, 0.5);
        }
        .controls {
            margin-top: 15px;
            color: #aaa;
            font-size: 0.9em;
        }
        .controls kbd {
            background: #333;
            padding: 5px 10px;
            border-radius: 5px;
            margin: 0 5px;
        }
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 20px;
            border: 3px solid #ff0064;
            display: none;
            z-index: 100;
        }
        .game-over h2 {
            color: #ff0064;
            font-size: 2.5em;
            margin-bottom: 20px;
        }
        .game-over p {
            color: #fff;
            font-size: 1.5em;
            margin-bottom: 30px;
        }
        .game-over button {
            background: linear-gradient(135deg, #ff0064, #ff4d4d);
            color: #fff;
            border: none;
            padding: 15px 40px;
            font-size: 1.2em;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .game-over button:hover {
            transform: scale(1.1);
        }
        .start-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 20px;
            border: 3px solid #ff0064;
            z-index: 100;
        }
        .start-screen h2 {
            color: #ff0064;
            font-size: 2em;
            margin-bottom: 20px;
        }
        .start-screen p {
            color: #fff;
            margin-bottom: 30px;
        }
        .start-screen button {
            background: linear-gradient(135deg, #ff0064, #ff4d4d);
            color: #fff;
            border: none;
            padding: 15px 40px;
            font-size: 1.2em;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .start-screen button:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🏎️ 极速赛车</h1>
        <div class="info-bar">
            <div class="score">得分：<span id="scoreVal">0</span></div>
            <div class="lives">生命：<span id="livesVal">❤️❤️❤️</span></div>
            <div class="level">等级：<span id="levelVal">1</span></div>
        </div>
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        <div class="controls">
            <kbd>←</kbd> <kbd>→</kbd> 或 <kbd>A</kbd> <kbd>D</kbd> 移动 | <kbd>↑</kbd> <kbd>W</kbd> 加速
        </div>
    </div>

    <div class="start-screen" id="startScreen">
        <h2>🏁 极速赛车 🏁</h2>
        <p>躲避车辆，收集金币，看你能得多少分！</p>
        <button onclick="startGame()">开始游戏</button>
    </div>

    <div class="game-over" id="gameOver">
        <h2>💥 游戏结束</h2>
        <p>最终得分：<span id="finalScore">0</span></p>
        <button onclick="restartGame()">再来一局</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // 游戏状态
        let gameRunning = false;
        let score = 0;
        let lives = 3;
        let level = 1;
        let speed = 3;
        let roadOffset = 0;
        
        // 玩家赛车
        const player = {
            x: 200,
            y: 500,
            width: 50,
            height: 80,
            speed: 5,
            dx: 0
        };
        
        // 障碍物数组
        let obstacles = [];
        // 金币数组
        let coins = [];
        // 粒子效果
        let particles = [];
        
        // 按键状态
        const keys = {
            left: false,
            right: false,
            up: false
        };
        
        // 监听键盘
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = true;
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = true;
            if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') keys.up = true;
        });
        
        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = false;
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = false;
            if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') keys.up = false;
        });
        
        // 绘制道路
        function drawRoad() {
            // 道路背景
            ctx.fillStyle = '#333';
            ctx.fillRect(50, 0, 300, canvas.height);
            
            // 路肩
            ctx.fillStyle = '#ff0064';
            ctx.fillRect(40, 0, 10, canvas.height);
            ctx.fillRect(350, 0, 10, canvas.height);
            
            // 道路标线
            ctx.strokeStyle = '#fff';
            ctx.setLineDash([40, 40]);
            ctx.lineWidth = 4;
            ctx.lineDashOffset = -roadOffset;
            
            ctx.beginPath();
            ctx.moveTo(150, 0);
            ctx.lineTo(150, canvas.height);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(250, 0);
            ctx.lineTo(250, canvas.height);
            ctx.stroke();
            
            ctx.setLineDash([]);
        }
        
        // 绘制玩家赛车
        function drawPlayer() {
            ctx.save();
            ctx.translate(player.x, player.y);
            
            // 车身
            ctx.fillStyle = '#ff0064';
            ctx.beginPath();
            ctx.roundRect(-player.width/2, -player.height/2, player.width, player.height, 10);
            ctx.fill();
            
            // 车顶
            ctx.fillStyle = '#cc0050';
            ctx.beginPath();
            ctx.roundRect(-player.width/2 + 5, -player.height/2 + 20, player.width - 10, 35, 5);
            ctx.fill();
            
            // 车窗
            ctx.fillStyle = '#00ffff';
            ctx.fillRect(-player.width/2 + 10, -player.height/2 + 25, player.width - 20, 15);
            
            // 车灯
            ctx.fillStyle = '#ffff00';
            ctx.beginPath();
            ctx.arc(-player.width/2 + 10, -player.height/2 + 5, 5, 0, Math.PI * 2);
            ctx.arc(player.width/2 - 10, -player.height/2 + 5, 5, 0, Math.PI * 2);
            ctx.fill();
            
            // 尾焰
            if (keys.up) {
                ctx.fillStyle = '#ff6600';
                ctx.beginPath();
                ctx.moveTo(-10, player.height/2);
                ctx.lineTo(0, player.height/2 + 20 + Math.random() * 10);
                ctx.lineTo(10, player.height/2);
                ctx.fill();
            }
            
            ctx.restore();
        }
        
        // 绘制障碍物
        function drawObstacles() {
            obstacles.forEach(obs => {
                ctx.save();
                ctx.translate(obs.x, obs.y);
                
                // 车身
                ctx.fillStyle = obs.color;
                ctx.beginPath();
                ctx.roundRect(-obs.width/2, -obs.height/2, obs.width, obs.height, 8);
                ctx.fill();
                
                // 车顶
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.beginPath();
                ctx.roundRect(-obs.width/2 + 5, -obs.height/2 + 15, obs.width - 10, 25, 5);
                ctx.fill();
                
                ctx.restore();
            });
        }
        
        // 绘制金币
        function drawCoins() {
            coins.forEach(coin => {
                ctx.save();
                ctx.translate(coin.x, coin.y);
                
                // 金币外圈
                ctx.fillStyle = '#ffd700';
                ctx.beginPath();
                ctx.arc(0, 0, coin.radius, 0, Math.PI * 2);
                ctx.fill();
                
                // 金币内圈
                ctx.fillStyle = '#ffec8b';
                ctx.beginPath();
                ctx.arc(0, 0, coin.radius - 5, 0, Math.PI * 2);
                ctx.fill();
                
                // 文字
                ctx.fillStyle = '#ffd700';
                ctx.font = 'bold 16px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('$', 0, 0);
                
                ctx.restore();
            });
        }
        
        // 绘制粒子
        function drawParticles() {
            particles.forEach((p, index) => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
                
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
                
                if (p.life <= 0) particles.splice(index, 1);
            });
        }
        
        // 创建粒子效果
        function createParticles(x, y, color, count = 10) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    size: Math.random() * 5 + 2,
                    color: color,
                    life: 1
                });
            }
        }
        
        // 生成障碍物
        function spawnObstacle() {
            const lanes = [100, 200, 300];
            const lane = lanes[Math.floor(Math.random() * lanes.length)];
            const colors = ['#0066ff', '#00ff66', '#ff6600', '#9900ff', '#ff00ff'];
            
            obstacles.push({
                x: lane,
                y: -100,
                width: 50,
                height: 80,
                color: colors[Math.floor(Math.random() * colors.length)],
                speed: speed * (0.8 + Math.random() * 0.4)
            });
        }
        
        // 生成金币
        function spawnCoin() {
            const lanes = [100, 200, 300];
            const lane = lanes[Math.floor(Math.random() * lanes.length)];
            
            coins.push({
                x: lane,
                y: -50,
                radius: 15,
                speed: speed
            });
        }
        
        // 碰撞检测
        function checkCollision(a, b) {
            return Math.abs(a.x - b.x) < (a.width/2 + b.width/2) &&
                   Math.abs(a.y - b.y) < (a.height/2 + b.height/2);
        }
        
        // 检查金币碰撞
        function checkCoinCollision(player, coin) {
            const dx = player.x - coin.x;
            const dy = player.y - coin.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            return distance < (player.width/2 + coin.radius);
        }
        
        // 更新游戏
        function update() {
            if (!gameRunning) return;
            
            // 玩家移动
            if (keys.left && player.x > 75) player.x -= player.speed;
            if (keys.right && player.x < 325) player.x += player.speed;
            if (keys.up && player.y > 100) player.y -= player.speed * 0.5;
            if (!keys.up && player.y < 500) player.y += player.speed * 0.3;
            
            // 道路滚动
            roadOffset += speed;
            if (roadOffset > 80) roadOffset = 0;
            
            // 生成障碍物
            if (Math.random() < 0.02 + level * 0.005) spawnObstacle();
            
            // 生成金币
            if (Math.random() < 0.015) spawnCoin();
            
            // 更新障碍物
            obstacles.forEach((obs, index) => {
                obs.y += obs.speed;
                
                if (checkCollision(player, obs)) {
                    createParticles(obs.x, obs.y, obs.color, 20);
                    obstacles.splice(index, 1);
                    lives--;
                    updateLives();
                    
                    if (lives <= 0) {
                        gameOver();
                    }
                }
                
                if (obs.y > canvas.height + 100) {
                    obstacles.splice(index, 1);
                    score += 10;
                    updateScore();
                }
            });
            
            // 更新金币
            coins.forEach((coin, index) => {
                coin.y += coin.speed;
                
                if (checkCoinCollision(player, coin)) {
                    createParticles(coin.x, coin.y, '#ffd700', 15);
                    coins.splice(index, 1);
                    score += 50;
                    updateScore();
                }
                
                if (coin.y > canvas.height + 50) {
                    coins.splice(index, 1);
                }
            });
            
            // 升级
            if (score > level * 500) {
                level++;
                speed += 0.5;
                document.getElementById('levelVal').textContent = level;
            }
        }
        
        // 更新分数显示
        function updateScore() {
            document.getElementById('scoreVal').textContent = score;
        }
        
        // 更新生命显示
        function updateLives() {
            let hearts = '';
            for (let i = 0; i < lives; i++) hearts += '❤️';
            document.getElementById('livesVal').textContent = hearts;
        }
        
        // 绘制
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            drawRoad();
            drawCoins();
            drawObstacles();
            drawPlayer();
            drawParticles();
        }
        
        // 游戏循环
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        // 开始游戏
        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            gameRunning = true;
            score = 0;
            lives = 3;
            level = 1;
            speed = 3;
            obstacles = [];
            coins = [];
            particles = [];
            player.x = 200;
            player.y = 500;
            updateScore();
            updateLives();
            document.getElementById('levelVal').textContent = level;
        }
        
        // 游戏结束
        function gameOver() {
            gameRunning = false;
            document.getElementById('gameOver').style.display = 'block';
            document.getElementById('finalScore').textContent = score;
        }
        
        // 重新开始
        function restartGame() {
            document.getElementById('gameOver').style.display = 'none';
            startGame();
        }
        
        // 启动游戏循环
        gameLoop();
    </script>
</body>
</html>
